<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sidebar Kanan - KosMen</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(to right, #f0f0f0, #e0e0e0);
    }

    /* Sidebar kanan */
    .sidebar {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: 250px;
      background-color: rgba(52, 58, 64, 0.8);
      color: #fff;
      backdrop-filter: blur(6px);
      transform: translateX(100%);
      transition: transform 0.3s ease-in-out;
      z-index: 1000;
      box-shadow: -3px 0 10px rgba(0,0,0,0.3);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar a {
      display: block;
      padding: 15px 20px;
      font-size: 1.1rem;
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar a:hover {
      background-color: rgba(255,255,255,0.1);
    }

    .sidebar-header {
      padding: 20px;
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
      background-color: rgba(0,0,0,0.3);
      position: relative;
    }

    .sidebar .close-btn {
      position: absolute;
      top: 10px;
      left: 15px;
      background: transparent;
      border: none;
      font-size: 1.5rem;
      color: #fff;
      cursor: pointer;
    }

    .sidebar .close-btn:hover {
      color: #00e5ff;
    }

    /* Tombol toggle kanan */
    .toggle-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1100;
      font-size: 1.5rem;
      color: rgb(17, 16, 16);
      background-color: rgba(255, 255, 255, 0.4); /* transparan putih abu */
      backdrop-filter: blur(30px); /* efek blur transparan */
      border: none;
      border-radius: 5px;
      padding: 10px 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: opacity 0.3s ease-in-out;
    }

    .toggle-btn.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Sidebar kanan -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      KosMen
      <button class="close-btn" id="close-btn">&times;</button>
    </div>
    <a href="dashboard.php">Home</a>
    <a href="pengelolaan_kamar.php">Kelola Kamar</a>
    <a href="monitor_pembayaran.php">Pembayaran</a>
    <a href="laporanKeungan.php">Laporan Keuangan</a>
    <a href="atur_alamat.php">Alamat</a>
  </div>

  <!-- Tombol toggle kanan -->
  <button class="toggle-btn" id="toggle-btn">☰</button>

  <!-- Script -->
  <script>
    const sidebar = document.getElementById("sidebar");
    const toggleBtn = document.getElementById("toggle-btn");
    const closeBtn = document.getElementById("close-btn");

    toggleBtn.addEventListener("click", () => {
      sidebar.classList.add("open");
      toggleBtn.classList.add("hidden");
    });

    closeBtn.addEventListener("click", () => {
      sidebar.classList.remove("open");
      toggleBtn.classList.remove("hidden");
    });
  </script>

</body>
</html>
